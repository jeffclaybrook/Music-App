    <link rel="manifest" href="manifest.json" crossorigin="use-credentials">
    <link rel="shortcut icon" href="images/favicon.ico">
    <link rel="icon" href="images/icon-192.png" sizes="192x192">
    <link rel="icon" href="images/icon-512.png" sizes="512x512">
    <link rel="apple-touch-icon" href="images/icon-192.png" sizes="192x192">
    <link rel="apple-touch-icon" href="images/icon-512.png" sizes="512x512">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main>
        <section id="playlist" class="playlist"></section>
    </main>
    <section id="player" class="player">
        <div class="header">
            <h4>Playing from Album</h4>
            <h3 id="album"></h3>
        </div>
        <div class="figure">
            <img id="poster" src="" alt="">
        </div>
        <div class="details" id="details">
            <h1 id="title"></h1>
            <h2 id="artist"></h2>
        </div>
        <div class="progress">
            <div id="track" class="track">
                <div id="seek" class="seek"></div>
            </div>
            <div class="label">
                <span id="timer">0:00</span>
                <span id="duration"></span>
            </div>
        </div>
        <div class="controls">
            <button id="prev-btn" class="md-btn" aria-label="Prev song" type="button" onclick="prevSong()"><span class="icon prev-icon"></span></button>
            <button id="play-btn" class="lg-btn" aria-label="Play song" type="button" onclick="togglePlayback()"><span class="icon play-icon"></span></button>
            <button id="next-btn" class="md-btn" aria-label="Next song" type="button" onclick="nextSong()"><span class="icon next-icon"></span></button>
        </div>
        <div class="sub-controls">
            <button id="share-btn" class="sm-btn" aria-label="Share app" type="button"><span class="icon share-icon"></span></button>
            <button id="close-btn" class="sm-btn" aria-label="Close player" type="button" onclick="closePlayer()"><span class="icon close-icon"></span></button>
        </div>
    </section>
    <script src="script.js"></script>
</body>
</html>
